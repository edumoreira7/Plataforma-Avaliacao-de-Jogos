<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameHub - Neo4j</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            padding: 40px 20px;
        }

        .container { max-width: 800px; margin: auto; }

        header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        header h1 { font-size: 2.5rem; color: #ffffff; }

        .status-bar {
            background: #1a1a2e;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #aaa;
        }
        .dot.online  { background: #00d1b2; }
        .dot.offline { background: #ff3860; }

        section {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 25px;
            border-left: 6px solid #00d1b2;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        h2 {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 1.4rem;
        }

        .badge {
            background: #00d1b2;
            color: #000;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7em;
            font-weight: bold;
        }

        .form-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            min-width: 180px;
            padding: 12px 15px;
            background: #0f0f1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        input:focus { border-color: #00d1b2; }

        button {
            background: #00d1b2;
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }

        button:hover { opacity: 0.8; transform: translateY(-2px); }

        .btn-secondary {
            background: #333;
            color: #fff;
        }

        .resultado {
            margin-top: 15px;
            background: #0f0f1a;
            border-radius: 8px;
            padding: 15px;
            font-size: 0.95rem;
            min-height: 50px;
            border: 1px solid #222;
            white-space: pre-wrap;
        }

        .sucesso { color: #00d1b2; }
        .erro    { color: #ff3860; }
    </style>
</head>
<body>

<div class="container">

    <header>
        <span style="font-size:2.5rem">🎮</span>
        <h1>GameHub Cloud</h1>
    </header>

    <!-- STATUS DO BACKEND -->
    <div class="status-bar">
        <div class="dot" id="dot"></div>
        <span id="status-text">Verificando conexão com o backend...</span>
    </div>

    <!-- CRIAR AMIZADE -->
    <section>
        <h2>👥 Sistema de Amigos <span class="badge">Neo4j (Grafos)</span></h2>
        <div class="form-row">
            <input id="f_user1" placeholder="Nome do Jogador 1">
            <input id="f_user2" placeholder="Nome do Jogador 2">
            <button onclick="criarAmizade()">Criar Amizade</button>
        </div>
        <div class="resultado" id="res-amizade">Aguardando...</div>
    </section>

    <!-- BUSCAR AMIGOS -->
    <section>
        <h2>🔍 Buscar Amigos <span class="badge">Neo4j (Grafos)</span></h2>
        <div class="form-row">
            <input id="busca_user" placeholder="Nome do Jogador">
            <button onclick="buscarAmigos()">Buscar</button>
        </div>
        <div class="resultado" id="res-busca">Aguardando...</div>
    </section>

    <!-- VER TODOS OS NÓS -->
    <section>
        <h2>🌐 Todos os Nós do Grafo <span class="badge">Neo4j (Grafos)</span></h2>
        <div class="form-row">
            <button onclick="verNos()">Ver Todos os Nós</button>
        </div>
        <div class="resultado" id="res-nos">Aguardando...</div>
    </section>

</div>

<script>
    const API = "http://localhost:5000";

    // Verifica status do backend ao carregar a página
    async function checkStatus() {
        try {
            const res = await fetch(`${API}/`);
            const data = await res.json();
            const dot = document.getElementById("dot");
            const txt = document.getElementById("status-text");

            if (data.neo4j && data.neo4j.includes("Conectado")) {
                dot.classList.add("online");
                txt.textContent = "✅ Backend Online — Neo4j AuraDB Conectado!";
            } else {
                dot.classList.add("offline");
                txt.textContent = "❌ Backend Online — Neo4j Desconectado!";
            }
        } catch (e) {
            const dot = document.getElementById("dot");
            const txt = document.getElementById("status-text");
            dot.classList.add("offline");
            txt.textContent = "❌ Backend Offline — rode: python app.py";
        }
    }

    async function criarAmizade() {
        const user1 = document.getElementById("f_user1").value.trim();
        const user2 = document.getElementById("f_user2").value.trim();
        const res_div = document.getElementById("res-amizade");

        if (!user1 || !user2) {
            res_div.innerHTML = '<span class="erro">⚠️ Preencha os dois nomes!</span>';
            return;
        }

        try {
            const res = await fetch(`${API}/friends`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({user1, user2})
            });
            const data = await res.json();
            if (data.status) {
                res_div.innerHTML = `<span class="sucesso">${data.status}</span>`;
            } else {
                res_div.innerHTML = `<span class="erro">❌ ${data.error}</span>`;
            }
        } catch (e) {
            res_div.innerHTML = '<span class="erro">❌ Erro ao conectar no backend!</span>';
        }
    }

    async function buscarAmigos() {
        const username = document.getElementById("busca_user").value.trim();
        const res_div = document.getElementById("res-busca");

        if (!username) {
            res_div.innerHTML = '<span class="erro">⚠️ Digite um nome!</span>';
            return;
        }

        try {
            const res = await fetch(`${API}/friends/${username}`);
            const data = await res.json();
            if (data.friends && data.friends.length > 0) {
                res_div.innerHTML = `<span class="sucesso">Amigos de ${data.user}:\n${data.friends.map(f => "• " + f).join("\n")}</span>`;
            } else {
                res_div.innerHTML = `<span class="erro">Nenhum amigo encontrado para "${username}"</span>`;
            }
        } catch (e) {
            res_div.innerHTML = '<span class="erro">❌ Erro ao conectar no backend!</span>';
        }
    }

    async function verNos() {
        const res_div = document.getElementById("res-nos");
        try {
            const res = await fetch(`${API}/nodes`);
            const data = await res.json();
            if (data.length > 0) {
                res_div.innerHTML = `<span class="sucesso">${data.map(n => `• ${n.name} [${n.tipo}]`).join("\n")}</span>`;
            } else {
                res_div.innerHTML = '<span class="erro">Nenhum nó encontrado. Crie uma amizade primeiro!</span>';
            }
        } catch (e) {
            res_div.innerHTML = '<span class="erro">❌ Erro ao conectar no backend!</span>';
        }
    }

    // Checa status ao abrir a página
    checkStatus();
</script>

</body>
</html>
